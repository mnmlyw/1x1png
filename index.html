<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1x1 PNG</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
  }
  .card {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 32px;
    width: 320px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  h1 span { color: #666; font-weight: 400; }
  .color-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  input[type="color"] {
    -webkit-appearance: none;
    appearance: none;
    width: 44px;
    height: 44px;
    border: 2px solid #333;
    border-radius: 8px;
    background: none;
    cursor: pointer;
    padding: 2px;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 5px; }
  .hex-input {
    flex: 1;
    background: #0f0f0f;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 10px 12px;
    color: #e0e0e0;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }
  .hex-input:focus { border-color: #555; }
  .alpha-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .alpha-row label {
    font-size: 13px;
    color: #888;
    min-width: 48px;
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 4px;
    background: #333;
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: #e0e0e0;
    border-radius: 50%;
    cursor: pointer;
  }
  .alpha-val {
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 13px;
    color: #888;
    min-width: 32px;
    text-align: right;
  }
  button {
    background: #fff;
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  button:active { opacity: 0.7; }
</style>
</head>
<body>
<div class="card">
  <h1>1x1 PNG <span>generator</span></h1>
  <div class="color-row">
    <input type="color" id="picker" value="#000000">
    <input type="text" class="hex-input" id="hex" value="#000000" maxlength="7" spellcheck="false">
  </div>
  <div class="alpha-row">
    <label>Alpha</label>
    <input type="range" id="alpha" min="0" max="255" value="255">
    <span class="alpha-val" id="alphaVal">255</span>
  </div>
  <button id="dl">Download PNG</button>
</div>
<canvas id="c" width="1" height="1" hidden></canvas>
<script>
  const picker = document.getElementById('picker');
  const hex = document.getElementById('hex');
  const alpha = document.getElementById('alpha');
  const alphaVal = document.getElementById('alphaVal');

  picker.addEventListener('input', () => hex.value = picker.value);
  hex.addEventListener('input', () => {
    if (hex.value && !hex.value.startsWith('#')) {
      hex.value = `#${hex.value}`;
    }

    const v = hex.value;
    if (/^#[0-9a-f]{6}$/i.test(v)) {
      picker.value = v;
    }
  });
  alpha.addEventListener('input', () => alphaVal.textContent = alpha.value);

  document.getElementById('dl').addEventListener('click', () => {
    const ctx = document.getElementById('c').getContext('2d');
    const r = parseInt(picker.value.slice(1, 3), 16);
    const g = parseInt(picker.value.slice(3, 5), 16);
    const b = parseInt(picker.value.slice(5, 7), 16);
    const a = parseInt(alpha.value);
    const img = ctx.createImageData(1, 1);
    img.data.set([r, g, b, a]);
    ctx.putImageData(img, 0, 0);
    const link = document.createElement('a');
    link.download = `${picker.value.slice(1)}-${a}.png`;
    link.href = document.getElementById('c').toDataURL('image/png');
    link.click();
  });
</script>
</body>
</html>
