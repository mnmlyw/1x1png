<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1x1 PNG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }

  :root {
    --color: #000000;
    --alpha: 1;
    --hue: 0;
  }

  body {
    min-height: 100dvh;
    font-family: "DM Mono", monospace;
    background: #0a0a0a;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .checkerboard {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(45deg, #1a1a1a 25%, transparent 25%),
      linear-gradient(-45deg, #1a1a1a 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #1a1a1a 75%),
      linear-gradient(-45deg, transparent 75%, #1a1a1a 75%);
    background-size: 40px 40px;
    background-position: 0 0, 0 20px, 20px -20px, -20px 0;
    background-color: #111;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .checkerboard.visible { opacity: 1; }

  .color-field {
    position: fixed;
    inset: 0;
    background: var(--color);
    opacity: var(--alpha);
    transition: opacity 0.4s ease;
  }

  .noise {
    position: fixed;
    inset: 0;
    opacity: 0.02;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
    mix-blend-mode: overlay;
  }

  .picker-panel {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(80px) saturate(1.6) brightness(1.05);
    -webkit-backdrop-filter: blur(80px) saturate(1.6) brightness(1.05);
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow:
      inset 0 0 0 0.5px rgba(255, 255, 255, 0.03),
      inset 0 1px 0 rgba(255, 255, 255, 0.04),
      0 60px 160px -30px rgba(0, 0, 0, 0.4),
      0 4px 40px rgba(0, 0, 0, 0.15);
    padding: 10px;
    animation: rise 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    width: 300px;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
  }

  .sv-field {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 3;
    cursor: crosshair;
    overflow: hidden;
    touch-action: none;
    border-radius: 12px;
    background: hsl(var(--hue), 100%, 50%);
  }
  .sv-field::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to right, #fff, transparent);
  }
  .sv-field::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent, #000);
  }
  .sv-thumb {
    position: absolute;
    width: 22px;
    height: 22px;
    border: 2px solid rgba(255, 255, 255, 0.9);
    border-radius: 50%;
    box-shadow:
      0 0 0 1px rgba(0, 0, 0, 0.2),
      0 2px 12px rgba(0, 0, 0, 0.3),
      0 0 20px rgba(255, 255, 255, 0.08);
    transform: translate(-50%, -50%);
    z-index: 2;
    pointer-events: none;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  .sliders {
    padding: 12px 6px 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .slider-label {
    font-size: 10px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.45);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    width: 12px;
    flex-shrink: 0;
  }

  .track {
    position: relative;
    flex: 1;
    height: 16px;
    border-radius: 8px;
    cursor: pointer;
    touch-action: none;
    overflow: hidden;
  }
  .track::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 8px;
    box-shadow:
      inset 0 1px 2px rgba(0, 0, 0, 0.12),
      0 0.5px 0 rgba(255, 255, 255, 0.04);
    pointer-events: none;
    z-index: 1;
  }

  .hue-track {
    background: linear-gradient(to right,
      hsl(0,100%,50%), hsl(60,100%,50%), hsl(120,100%,50%),
      hsl(180,100%,50%), hsl(240,100%,50%), hsl(300,100%,50%),
      hsl(360,100%,50%)
    );
  }

  .alpha-track {
    background-image:
      linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
      linear-gradient(-45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.05) 75%),
      linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.05) 75%);
    background-size: 8px 8px;
    background-position: 0 0, 0 4px, 4px -4px, -4px 0;
  }
  .alpha-gradient {
    position: absolute;
    inset: 0;
    border-radius: 8px;
    pointer-events: none;
  }

  .track-thumb {
    position: absolute;
    top: 50%;
    width: 12px;
    height: 12px;
    border: 2px solid rgba(255, 255, 255, 0.95);
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    box-shadow:
      0 0 0 1px rgba(0, 0, 0, 0.15),
      0 2px 6px rgba(0, 0, 0, 0.25),
      0 0 12px rgba(255, 255, 255, 0.06);
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 2;
  }

  .slider-input {
    width: 68px;
    height: 28px;
    flex-shrink: 0;
    font-family: "DM Mono", monospace;
    font-size: 11px;
    font-weight: 400;
    border-radius: 6px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(255, 255, 255, 0.04);
    color: rgba(255, 255, 255, 0.85);
    letter-spacing: 0.03em;
    outline: none;
    transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
  }
  .hex-input { padding: 0 8px; }
  .alpha-input { padding: 0 6px; text-align: center; width: 48px; }

  .slider-input:focus {
    background: rgba(255, 255, 255, 0.07);
    border-color: rgba(255, 255, 255, 0.14);
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.03);
  }
  .slider-input::selection {
    background: rgba(255, 255, 255, 0.15);
  }

  .bottom {
    padding: 10px 6px 4px;
  }

  .dl-btn {
    width: 100%;
    height: 36px;
    font-family: "DM Mono", monospace;
    font-size: 12px;
    font-weight: 500;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    background: rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.85);
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s, transform 0.1s;
  }
  .dl-btn:hover {
    background: rgba(255, 255, 255, 0.14);
    border-color: rgba(255, 255, 255, 0.12);
    box-shadow: 0 0 24px rgba(255, 255, 255, 0.04);
  }
  .dl-btn:active { transform: scale(0.98); }

  @media (max-width: 440px) {
    .picker-panel {
      width: calc(100vw - 24px);
      border-radius: 16px;
    }
  }
</style>
</head>
<body>

<div class="checkerboard" id="checker"></div>
<div class="color-field"></div>
<div class="noise"></div>

<div class="picker-panel">
  <div class="sv-field" id="svField">
    <div class="sv-thumb" id="svThumb"></div>
  </div>
  <div class="sliders">
    <div class="slider-row">
      <span class="slider-label">H</span>
      <div class="track hue-track" id="hueTrack">
        <div class="track-thumb" id="hueThumb"></div>
      </div>
      <input type="text" class="slider-input hex-input" id="hex" value="#000000" maxlength="7" spellcheck="false">
    </div>
    <div class="slider-row">
      <span class="slider-label">&alpha;</span>
      <div class="track alpha-track" id="alphaTrack">
        <div class="alpha-gradient" id="alphaGrad"></div>
        <div class="track-thumb" id="alphaThumb"></div>
      </div>
      <input type="text" class="slider-input alpha-input" id="alphaVal" value="255" maxlength="3" spellcheck="false">
    </div>
  </div>
  <div class="bottom">
    <button class="dl-btn" id="dl">.png</button>
  </div>
</div>

<canvas id="c" width="1" height="1" hidden></canvas>

<script>
  let H = 0, S = 0, V = 0, A = 255;

  const $ = id => document.getElementById(id);
  const svField = $('svField'), svThumb = $('svThumb');
  const hueTrack = $('hueTrack'), hueThumb = $('hueThumb');
  const alphaTrack = $('alphaTrack'), alphaThumb = $('alphaThumb');
  const alphaGrad = $('alphaGrad');
  const hexInput = $('hex'), alphaInput = $('alphaVal');
  const checker = $('checker');
  const root = document.documentElement.style;

  function hsvToRgb(h, s, v) {
    h /= 360;
    const i = Math.floor(h * 6), f = h * 6 - i;
    const p = v * (1 - s), q = v * (1 - f * s), t = v * (1 - (1 - f) * s);
    let r, g, b;
    switch (i % 6) {
      case 0: r=v;g=t;b=p; break; case 1: r=q;g=v;b=p; break;
      case 2: r=p;g=v;b=t; break; case 3: r=p;g=q;b=v; break;
      case 4: r=t;g=p;b=v; break; case 5: r=v;g=p;b=q; break;
    }
    return [Math.round(r * 255), Math.round(g * 255), Math.round(b * 255)];
  }

  function rgbToHsv(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r, g, b), d = max - Math.min(r, g, b);
    let h = 0, s = max === 0 ? 0 : d / max;
    if (d) {
      if (max === r) h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
      else if (max === g) h = ((b - r) / d + 2) / 6;
      else h = ((r - g) / d + 4) / 6;
    }
    return [h * 360, s, max];
  }

  function rgbToHex(r, g, b) {
    return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
  }

  function hexToRgb(hex) {
    const m = hex.match(/^#?([0-9a-f]{6})$/i);
    if (!m) return null;
    const v = m[1];
    return [parseInt(v.slice(0, 2), 16), parseInt(v.slice(2, 4), 16), parseInt(v.slice(4, 6), 16)];
  }

  function update() {
    const [r, g, b] = hsvToRgb(H, S, V);
    const color = rgbToHex(r, g, b);
    const a = A / 255;

    root.setProperty('--color', color);
    root.setProperty('--alpha', a);
    root.setProperty('--hue', H);
    svField.style.background = `hsl(${H}, 100%, 50%)`;

    svThumb.style.left = (S * 100) + '%';
    svThumb.style.top = ((1 - V) * 100) + '%';
    hueThumb.style.left = (H / 360 * 100) + '%';
    alphaThumb.style.left = (a * 100) + '%';
    alphaGrad.style.background = `linear-gradient(to right, transparent, ${color})`;

    hexInput.value = color;
    alphaInput.value = A;
    checker.classList.toggle('visible', a < 1);
  }

  function clamp01(v) { return Math.max(0, Math.min(1, v)); }

  function makeDraggable(el, onDrag) {
    let rect;
    el.addEventListener('pointerdown', e => {
      rect = el.getBoundingClientRect();
      el.setPointerCapture(e.pointerId);
      onDrag(e, rect);
    });
    el.addEventListener('pointermove', e => {
      if (rect) onDrag(e, rect);
    });
    el.addEventListener('pointerup', () => { rect = null; });
  }

  makeDraggable(svField, (e, rect) => {
    S = clamp01((e.clientX - rect.left) / rect.width);
    V = 1 - clamp01((e.clientY - rect.top) / rect.height);
    update();
  });

  makeDraggable(hueTrack, (e, rect) => {
    H = clamp01((e.clientX - rect.left) / rect.width) * 360;
    update();
  });

  makeDraggable(alphaTrack, (e, rect) => {
    A = Math.round(clamp01((e.clientX - rect.left) / rect.width) * 255);
    update();
  });

  hexInput.addEventListener('input', () => {
    let v = hexInput.value;
    if (v && !v.startsWith('#')) v = hexInput.value = '#' + v;
    const rgb = hexToRgb(v);
    if (rgb) {
      [H, S, V] = rgbToHsv(...rgb);
      update();
    }
  });

  alphaInput.addEventListener('input', () => {
    const v = parseInt(alphaInput.value);
    if (!isNaN(v)) {
      A = Math.max(0, Math.min(255, v));
      update();
    }
  });

  $('dl').addEventListener('click', () => {
    const [r, g, b] = hsvToRgb(H, S, V);
    const ctx = $('c').getContext('2d');
    const img = ctx.createImageData(1, 1);
    img.data.set([r, g, b, A]);
    ctx.putImageData(img, 0, 0);
    const link = document.createElement('a');
    link.download = `${rgbToHex(r, g, b).slice(1)}-${A}.png`;
    link.href = $('c').toDataURL('image/png');
    link.click();
  });

  update();
</script>
</body>
</html>
